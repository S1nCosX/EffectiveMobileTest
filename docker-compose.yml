services:
  db:
    container_name: db
    image: postgres:18.4-alpine3.24
    volumes:
      - ./psqldata:/var/lib/postgresql
    environment:
      - POSTGRES_DB=$DB_NAME
      - POSTGRES_USER=$DB_USER
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_pw
    healthcheck:
      test: ["CMD", "pg_isready", "-U",  "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 15s
      timeout: 1s
      retries: 5
      start_period: 30s
    restart: always
    secrets:
      - db_pw

  migrator:
    image: migrate/migrate:4
    volumes:
      - ./migrations:/migrations
    entrypoint: ["/bin/sh", "-c"]
    environment:
      - DB_PW=/run/secrets/db_pw
      - DB_HOST=$DB_HOST
      - DB_NAME=$DB_NAME
      - DB_PORT=$DB_PORT
      - DB_USER=$DB_USER
    command: 
      - >
        migrate -path /migrations -database "postgres://$$DB_USER:$$(cat $$DB_PW)@$$DB_HOST:$$DB_PORT/$$DB_NAME?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_pw

  consul:
    container_name: consul
    image: consul:1.15
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8500/v1/status/leader"]
      interval: 15s
      timeout: 1s
      retries: 5
      start_period: 30s
    restart: always

  server:
    build: ./server
    depends_on:
      migrator:
        condition: service_completed_successfully
      consul:
        condition: service_healthy
    deploy:
      replicas: ${REPLICAS}
    environment:
      - HOST=${HOST}
      - PORT=${PORT}
      - CONSUL_ADDR=${CONSUL_ADDR}
      - CONSUL_PORT=${CONSUL_PORT}
      - DB_HOST=$DB_HOST
      - DB_NAME=$DB_NAME
      - DB_PORT=$DB_PORT
      - DB_USER=$DB_USER
      - DB_PW=/run/secrets/db_pw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 1s
      retries: 5
      start_period: 5s
    restart: always
    secrets:
      - db_pw

  balancer:
    container_name: balancer
    build: ./haproxy
    depends_on:
      - server
    ports:
      - $BALANCER_PORT:80
    volumes:
      - ./haproxy/haproxy.cfg.tmpl:/etc/haproxy/haproxy.cfg.tmpl
    environment:
      - CONSUL_ADDR=${CONSUL_ADDR}
      - CONSUL_PORT=${CONSUL_PORT}
      - HEALTH_CHECK_TIMEOUT=${HEALTH_CHECK_TIMEOUT}
    restart: always

secrets:
  db_pw:
    file: ${DB_PW_FILE}